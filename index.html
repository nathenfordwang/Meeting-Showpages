<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Analysis</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body, html { 
            height: 100%; 
            background: #0a0a0a; 
            overflow: hidden; 
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #111;
        }

        .footer {
            background: #1f1f1f;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- PDF 主要區域 -->
        <iframe id="pdfFrame" 
                src="20260415_CRM_Comparison_and_Technical_Analysis_Andy.pdf#page=1" 
                title="CRM Analysis">
        </iframe>

        <!-- 底部提示文字 -->
        <div class="footer">
            使用鍵盤 ← 上一頁　　→ 下一頁　　｜　按 <strong>F11</strong> 進入全螢幕模式
        </div>
    </div>

    <script>
        const iframe = document.getElementById('pdfFrame');
        let currentPage = 1;

        // 鍵盤控制
        document.addEventListener('keydown', function(e) {
            if (e.key === "ArrowRight") {
                currentPage++;
                iframe.src = `20260415_CRM_Comparison_and_Technical_Analysis_Andy.pdf#page=${currentPage}`;
            } 
            else if (e.key === "ArrowLeft") {
                if (currentPage > 1) {
                    currentPage--;
                    iframe.src = `20260415_CRM_Comparison_and_Technical_Analysis_Andy.pdf#page=${currentPage}`;
                }
            }
        });

        // 頁面載入完成
        window.addEventListener('load', () => {
            console.log("PDF 已載入");
        });
    </script>
</body>
</html>
